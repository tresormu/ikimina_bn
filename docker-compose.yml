services:
  postgres:
    image: postgres:15-alpine
    container_name: ikimina_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ikimina
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ikimina_net
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d ikimina']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      DATABASE_URL: 'postgresql://root:password@postgres:5432/ikimina?schema=public'
      NODE_ENV: development
    command: sh -c "npx prisma migrate deploy && npm run start:dev"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ikimina_net
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  ikimina_net:
    driver: bridge
